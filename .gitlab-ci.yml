image: node:18-alpine

stages:
  - lint             #feature
  - build            #feature
  - test             #developer
  - deploy           #developer
  - sonarqube        #main

variables:
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.npm"

# workflow:
#   rules:
#     - if: '$CI_PIPELINE_SOURCE == "push"'
#     - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

# ==================== LINT STAGE ====================

lint:
  stage: lint
  script:
    - echo "Running ESLint..."
    - npm ci
    - npm run lint || true
  artifacts:
    paths:
      - eslint-report.json
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "feature"'

# ==================== BUILD STAGE ====================

build:
  stage: build
  script:
    - echo "Building project..."
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH == "feature"'
 
# ==================== TEST STAGE ====================

test:
  stage: test
  script:
    - echo "Running tests..."
    - npm ci
    - npm run test -- --passWithNoTests 2>&1 || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "developer"'

# ==================== SONARQUBE STAGE ====================

sonarqube:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - echo "Running SonarQube analysis..."
    - |
      sonar-scanner \
        -Dsonar.projectKey=nexaprime-ani_golo \
        -Dsonar.projectName="GOLO" \
        -Dsonar.projectVersion=1.0.0 \
        -Dsonar.sources=src \
        -Dsonar.tests=src \
        -Dsonar.test.inclusions=**/*.spec.ts,**/*.test.ts \
        -Dsonar.exclusions=node_modules/**,dist/**,coverage/**,*.js \
        -Dsonar.typescript.tsconfigPath=tsconfig.json \
        -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,src/main.ts \
        -Dsonar.organization=nexaprime-ani \
        -Dsonar.host.url=${SONAR_HOST_URL} \
        -Dsonar.token=${SONAR_TOKEN}
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $SONAR_HOST_URL && $SONAR_TOKEN'

# ==================== STAGE HEALTH CHECK STAGE ====================

staging-health-check:
  stage: deploy
  script:
    - apk add --no-cache curl
    - echo "Checking frontend availability..."
    - |
      for i in {1..10}; do
        if curl -f  https://golo-backend-yj3n.onrender.com; then
          echo "Backend is live ✅"
          exit 0
        fi
        echo "Retrying..."
        sleep 2
      done

      echo "Frontend failed health check ❌"
      exit 1
  rules:
    - if: '$CI_COMMIT_BRANCH == "developer"'

