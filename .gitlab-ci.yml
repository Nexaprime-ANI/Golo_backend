image: node:18-alpine  

stages:
  - validate
  - build
  - deploy

cache:
  key:
    files:
      - package-lock.json  
    paths:
      - node_modules/
      - .npm/

feature-validation:
  stage: validate
  script:
    - npm ci
    - npm run lint
    - npm run test
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 month
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*$/'
      changes:
        - src/**/*
        - package.json
        - package-lock.json
