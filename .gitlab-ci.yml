image: node:18-alpine

stages:
  - lint
  - build
  - codacy
  - test
  - deploy

variables:
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.npm"
  RUN_ONLY_SONAR: "true"   # 🔥 toggle here

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

# ==================== LINT ====================

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint || true
  rules:
    - if: '$RUN_ONLY_SONAR == "true"'
      when: never
    - when: on_success

# ==================== BUILD ====================

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
  rules:
    - if: '$RUN_ONLY_SONAR == "true"'
      when: never
    - when: on_success

# ==================== SONARQUBE ====================

codacy:
  stage: codacy
  image: codacy/codacy-analysis-cli:latest
  script:
    - echo "Running Codacy analysis..."

    # Run analysis
    - codacy-analysis-cli analyze

    # Upload results
    - codacy-analysis-cli upload-results
  variables:
    CODACY_PROJECT_TOKEN: $CODACY_PROJECT_TOKEN
  allow_failure: true 
  rules:
    - if: '$CI_COMMIT_BRANCH == "feature"'

# ==================== TEST ====================

test:
  stage: test
  script:
    - npm ci
    - npm run test -- --passWithNoTests || true
  rules:
    - if: '$RUN_ONLY_SONAR == "true"'
      when: never
    - when: on_success

# ==================== DEPLOY ====================

staging-health-check:
  stage: deploy
  script:
    - echo "Checking frontend..."
  rules:
    - if: '$RUN_ONLY_SONAR == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "developer"'