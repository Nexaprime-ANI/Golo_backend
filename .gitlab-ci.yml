image: node:18-alpine

stages:
  - lint
  - build
  - sonarqube
  - test
  - deploy

variables:
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.npm"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

# ==================== LINT STAGE ====================

lint:
  stage: lint
  script:
    - echo "🔍 Running ESLint..."
    - npm ci
    - npm run lint || true
  artifacts:
    paths:
      - eslint-report.json
    when: always
  allow_failure: true
  rules:
    - when: always

# ==================== BUILD STAGE ====================

build:
  stage: build
  script:
    - echo "🔨 Building project..."
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  rules:
    - when: always

# ==================== SONARQUBE STAGE ====================

sonarqube:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - echo "🔬 Running SonarQube analysis..."
    - |
      sonar-scanner \
        -Dsonar.projectKey=golo-ads-service \
        -Dsonar.projectName="GOLO Backend - ADS Service" \
        -Dsonar.projectVersion=1.0.0 \
        -Dsonar.sources=src \
        -Dsonar.tests=src \
        -Dsonar.test.inclusions=**/*.spec.ts,**/*.test.ts \
        -Dsonar.exclusions=node_modules/**,dist/**,coverage/**,*.js \
        -Dsonar.typescript.tsconfigPath=tsconfig.json \
        -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,src/main.ts \
        -Dsonar.host.url=${SONAR_HOST_URL} \
        -Dsonar.login=${SONAR_TOKEN}
  allow_failure: true
  rules:
    - if: '$SONAR_HOST_URL && $SONAR_TOKEN'
      when: always
    - when: never

# ==================== TEST STAGE ====================

test:
  stage: test
  script:
    - echo "🧪 Running tests..."
    - npm ci
    - npm run test -- --passWithNoTests 2>&1 || true
  allow_failure: true
  rules:
    - when: always

# ==================== DEPLOY STAGE ====================

deploy:
  stage: deploy
  script:
    - echo "🚀 Deploying..."
  when: manual
  only:
    - main
